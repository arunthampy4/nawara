<svg viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spotless modern living room interior">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCEFFb"/><stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F7FA"/><stop offset="1" stop-color="#E7EEF4"/>
    </linearGradient>
    <linearGradient id="art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22BCE6"/><stop offset=".5" stop-color="#16A6C9"/><stop offset="1" stop-color="#43B649"/>
    </linearGradient>
  </defs>
  <!-- wall -->
  <rect width="640" height="520" fill="#FBFDFF"/>
  <!-- floor -->
  <rect y="392" width="640" height="128" fill="url(#floor)"/>
  <!-- window -->
  <rect x="356" y="60" width="232" height="300" rx="8" fill="url(#sky)" stroke="#D4E2EE" stroke-width="3"/>
  <line x1="472" y1="60" x2="472" y2="360" stroke="#D4E2EE" stroke-width="3"/>
  <line x1="356" y1="210" x2="588" y2="210" stroke="#D4E2EE" stroke-width="3"/>
  <!-- skyline -->
  <g fill="#CFE6F3" opacity=".8">
    <rect x="372" y="150" width="26" height="60"/><rect x="406" y="120" width="22" height="90"/>
    <rect x="500" y="140" width="24" height="70"/><rect x="534" y="110" width="20" height="100"/>
  </g>
  <!-- wall art -->
  <rect x="92" y="96" width="150" height="104" rx="6" fill="#fff" stroke="#E2EAF1" stroke-width="3"/>
  <rect x="104" y="108" width="126" height="80" rx="3" fill="url(#art)" opacity=".85"/>
  <!-- plant -->
  <rect x="300" y="300" width="44" height="60" rx="6" fill="#E8EFF5"/>
  <path d="M322 300c-18-6-30-26-26-50 18 4 30 22 26 50Z" fill="#43B649" opacity=".85"/>
  <path d="M322 300c16-10 22-32 14-54-16 8-22 30-14 54Z" fill="#2FA84F" opacity=".85"/>
  <path d="M322 300c-2-22 8-40 26-48-2 22-12 38-26 48Z" fill="#5CC85F" opacity=".8"/>
  <!-- sofa -->
  <rect x="56" y="300" width="244" height="92" rx="20" fill="#EDF2F7"/>
  <rect x="44" y="266" width="60" height="120" rx="20" fill="#F4F8FB"/>
  <rect x="252" y="266" width="60" height="120" rx="20" fill="#F4F8FB"/>
  <rect x="92" y="252" width="80" height="64" rx="14" fill="#BFE0F2"/>
  <rect x="186" y="252" width="80" height="64" rx="14" fill="#A9D8B0"/>
  <!-- coffee table -->
  <rect x="120" y="404" width="150" height="14" rx="6" fill="#DCE6EE"/>
  <rect x="132" y="418" width="8" height="34" rx="3" fill="#CBD8E2"/>
  <rect x="250" y="418" width="8" height="34" rx="3" fill="#CBD8E2"/>
  <!-- rug -->
  <ellipse cx="190" cy="470" rx="170" ry="26" fill="#E3ECF4"/>
  <!-- sparkle -->
  <g stroke="#1295D8" stroke-width="3" stroke-linecap="round" opacity=".7">
    <path d="M540 250v18M531 259h18"/>
  </g>
  <g stroke="#43B649" stroke-width="2.6" stroke-linecap="round" opacity=".7">
    <path d="M286 150v14M279 157h14"/>
  </g>
</svg>
